<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="top-navbar">
        <div class="logo-area">
            <span class="logo-icon">AP</span>
            <span>Arena Pernambuco Digital</span>
        </div>
    </div>
    <div class="main-content">
        <div class="login-card">
            <form th:action="@{/cadastro}" method="post" class="login-form">
                <div class="input-box">
                    <label>Nome Completo</label>
                    <input type="text" name="name" required>
                </div>
                <div class="input-box">
                    <label>E-mail</label>
                    <input type="email" name="email" required>
                </div>
                <div class="input-box">
                    <label>Tipo de Acesso</label>
                    <div class="radio-group">
                        <input type="radio" name="role" value="citizen" id="citizen" required>
                        <label for="citizen" class="radio-label">CIDADÃO</label>
                        
                        <input type="radio" name="role" value="admin" id="admin" required>
                        <label for="admin" class="radio-label">ADMIN</label>
                    </div>
                </div>
                <div class="input-box">
                    <label>Senha</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-entrar">CADASTRAR</button>
            </form>
            <div class="card-footer">
                Já é cadastrado? <a th:href="@{/login}">Entrar</a>
            </div>
        </div>
    </div>
</body>
</html>
