<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/gestor.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title" style="font-weight: bold; font-size: 15px;">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">Painel do Gestor</span>
        </div>
    </div>
    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/gestor/dashboard}" style="text-decoration: none; color: #666; font-size: 14px;">Painel</a>
        <a th:href="@{/gestor/agenda}" style="text-decoration: none; color: #3498db; font-weight: bold; font-size: 14px;">Agenda</a>
        <a th:href="@{/gestor/stats}" style="text-decoration: none; color: #666; font-size: 14px;">Estatísticas</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="btn-primary" style="padding: 8px 20px; cursor: pointer; border: none; font-family: inherit;">Sair</button>
        </form>
    </nav>
</header>

<section class="page-hero">
    <h2>Agenda de Eventos</h2>
    <p>Visualize todos os eventos aprovados em ordem cronológica</p>
</section>

<div style="max-width: 900px; margin: 0 auto; padding: 30px 20px;">

    <div th:if="${eventos != null && eventos.size() > 0}">
        <div class="agenda-card" th:each="evento : ${eventos}">
            <div class="agenda-date-block">
                <div class="agenda-day" th:text="${#temporals.format(evento.date, 'dd')}"></div>
                <div class="agenda-month" th:text="${#temporals.format(evento.date, 'MMM')}"></div>
            </div>
            <div class="agenda-info" style="flex: 1;">
                <h4 th:text="${evento.title}"></h4>
                <p>🕐 <span th:text="${#temporals.format(evento.date, 'HH:mm')}"></span>
                   &nbsp;·&nbsp; <span th:text="${evento.category != null ? evento.category.name : '—'}"></span>
                   &nbsp;·&nbsp; R$ <span th:text="${#numbers.formatDecimal(evento.fullPrice, 1, 2, 'DEFAULT')}"></span>
                </p>
                <p th:if="${evento.empresa != null}" style="margin-top: 4px; font-size: 12px;">
                    🏢 <span th:text="${evento.empresa.name}"></span>
                </p>
            </div>
            <form th:action="@{/gestor/cancelar/{id}(id=${evento.id})}" method="post" style="margin: 0;">
                <button type="submit" class="btn-reject" onclick="return confirm('Cancelar este evento?')" style="font-size: 12px; padding: 7px 14px;">Cancelar</button>
            </form>
        </div>
    </div>

    <div th:if="${eventos == null || eventos.size() == 0}" class="empty-state" style="background: white; border-radius: 12px;">
        Nenhum evento aprovado na agenda.
    </div>

</div>

</body>
</html>
