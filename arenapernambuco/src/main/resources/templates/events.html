<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Pernambuco - Descubra Eventos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title" style="font-weight: bold; font-size: 15px;">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">Eventos e Entretenimento</span>
        </div>
    </div>

    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/events}" style="text-decoration: none; color: var(--laranja); font-weight: bold;">Eventos</a>
        <a th:href="@{/meus-ingressos}" style="text-decoration: none; color: #666; font-size: 14px;">Meus Ingressos</a>
        <a th:href="@{/login}" class="btn-primary" style="padding: 8px 20px;">Entrar</a>
    </nav>
</header>

<section class="hero">
    <h2>Descubra os melhores eventos</h2>
    <p>O maior espaço de entretenimento do Nordeste espera por você</p>

    <form th:action="@{/events}" method="get" class="search-box">
        <input type="text" name="q" placeholder="Buscar eventos por nome ou artista..." th:value="${q}">
        <button type="submit" class="btn-search">Buscar</button>
    </form>
</section>

<div class="container-main" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <section class="filters-area">
        <div class="tags">
            <a th:href="@{/events}" th:classappend="${selectedCategory == null ? 'active' : ''}">Todos</a>
            <a th:href="@{/events(category='Show')}" th:classappend="${selectedCategory == 'Show' ? 'active' : ''}">Show</a>
            <a th:href="@{/events(category='Esporte')}" th:classappend="${selectedCategory == 'Esporte' ? 'active' : ''}">Esporte</a>
            <a th:href="@{/events(category='Teatro')}" th:classappend="${selectedCategory == 'Teatro' ? 'active' : ''}">Teatro</a>
        </div>

        <div class="select-box">
            <select onchange="window.location.href=`/events?sort=${this.value}`">
                <option value="date" th:selected="${sort == 'date'}">Data mais próxima</option>
                <option value="price_asc" th:selected="${sort == 'price_asc'}">Menor preço</option>
            </select>
        </div>
    </section>

    <p class="results-text" th:text="${events != null ? events.size() + ' eventos encontrados' : '0 eventos encontrados'}"></p>

    <section class="grid" th:if="${events != null && events.size() > 0}">
        <div class="card" th:each="event : ${events}">
            <div class="card-img-wrapper">
                <img th:src="${event.imageUrl}" alt="Imagem do Evento">
                <span class="tag-badge" th:text="${event.category.name}"></span>
            </div>
            <div class="card-content">
                <h3 th:text="${event.title}"></h3>
                <p class="event-date">📅 <span th:text="${#temporals.format(event.date, 'dd/MM/yyyy - HH:mm')}"></span></p>
                <div class="card-footer">
                    <strong class="price" th:text="'R$ ' + ${#numbers.formatDecimal(event.fullPrice, 1, 2, 'DEFAULT')}"></strong>
                    <a th:href="@{/compra/{id}(id=${event.id})}" class="btn-details">Ver detalhes</a>
                </div>
            </div>
        </div>
    </section>

    <section th:if="${events == null || events.size() == 0}" class="empty-state">
        <p>Nenhum evento encontrado para esta busca.</p>
    </section>
</div>

</body>
</html>
