<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/empresa.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title" style="font-weight: bold; font-size: 15px;">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">Empresa Parceira</span>
        </div>
    </div>
    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/empresa/dashboard}" style="text-decoration: none; color: #666; font-size: 14px;">Meus Eventos</a>
        <a th:href="@{/empresa/criar-evento}" style="text-decoration: none; color: #666; font-size: 14px;">Criar Evento</a>
        <a th:href="@{/empresa/stats}" style="text-decoration: none; color: var(--laranja); font-weight: bold; font-size: 14px;">Estatísticas</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="btn-primary" style="padding: 8px 20px; cursor: pointer; border: none; font-family: inherit;">Sair</button>
        </form>
    </nav>
</header>

<section class="page-hero">
    <h2>Estatísticas</h2>
    <p>Acompanhe o desempenho dos seus eventos</p>
</section>

<div style="max-width: 1200px; margin: 0 auto; padding: 30px 20px;">

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalEventos}">0</div>
            <div class="stat-label">Total de Eventos</div>
        </div>
        <div class="stat-card verde">
            <div class="stat-number" th:text="${aprovados}">0</div>
            <div class="stat-label">Aprovados</div>
        </div>
        <div class="stat-card amarelo">
            <div class="stat-number" th:text="${pendentes}">0</div>
            <div class="stat-label">Pendentes</div>
        </div>
        <div class="stat-card vermelho">
            <div class="stat-number" th:text="${cancelados}">0</div>
            <div class="stat-label">Cancelados</div>
        </div>
        <div class="stat-card azul">
            <div class="stat-number" th:text="${totalIngressos}">0</div>
            <div class="stat-label">Ingressos Vendidos</div>
        </div>
        <div class="stat-card verde">
            <div class="stat-number" th:text="'R$ ' + ${#numbers.formatDecimal(receita, 1, 2, 'DEFAULT')}">R$ 0,00</div>
            <div class="stat-label">Receita Total</div>
        </div>
    </div>

    <p class="section-title">Ingressos por Evento</p>
    <table class="data-table">
        <thead>
            <tr>
                <th>Evento</th>
                <th>Data</th>
                <th>Status</th>
                <th>Preço</th>
                <th>Ingressos Vendidos</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="entry : ${ingressosPorEvento}">
                <td th:text="${entry.key.title}"></td>
                <td th:text="${#temporals.format(entry.key.date, 'dd/MM/yyyy')}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="${entry.key.status.name() == 'APROVADO' ? ' badge-aprovado' : (entry.key.status.name() == 'CANCELADO' ? ' badge-cancelado' : ' badge-pendente')}"
                          th:text="${entry.key.status.name()}"
                          style="position: static; display: inline-block;">
                    </span>
                </td>
                <td th:text="'R$ ' + ${#numbers.formatDecimal(entry.key.fullPrice, 1, 2, 'DEFAULT')}"></td>
                <td style="font-weight: 700;" th:text="${entry.value}"></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
