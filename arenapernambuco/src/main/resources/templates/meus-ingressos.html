<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Ingressos - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/meus-ingressos.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">Eventos e Entretenimento</span>
        </div>
    </div>
    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/events}" style="text-decoration: none; color: #666; font-size: 14px;">Eventos</a>
        <a th:href="@{/meus-ingressos}" style="text-decoration: none; color: var(--laranja); font-weight: bold; font-size: 14px;">Meus Ingressos</a>
        <a th:href="@{/login}" class="btn-primary" style="padding: 8px 20px;">Entrar</a>
    </nav>
</header>

<main class="container-ingressos">
    <div class="page-header">
        <h1>Meus Ingressos</h1>
        <p>Veja abaixo seus ingressos para os próximos eventos na Arena.</p>
    </div>

    <div class="ingressos-grid" th:if="${ingressos != null && !ingressos.empty}">
        <div class="ticket-card" th:each="ingresso : ${ingressos}">
            <div class="ticket-thumb">
                <img th:src="${ingresso.evento.imageUrl}" alt="Evento">
            </div>

            <div class="ticket-details">
                <span class="ticket-category" th:text="${ingresso.evento.category.name}"></span>
                <h3 th:text="${ingresso.evento.title}"></h3>

                <div class="ticket-info-rows">
                    <p>📅 <span th:text="${#temporals.format(ingresso.evento.date, 'dd/MM/yyyy - HH:mm')}"></span></p>
                    <p>📍 Arena Pernambuco</p>
                </div>

                <div class="ticket-footer">
                    <div class="qr-placeholder">
                        <span style="font-size: 10px; color: #999; display: block;">CÓDIGO:</span>
                        <strong th:text="${ingresso.id}"></strong>
                    </div>
                    <button class="btn-download">Baixar Ingresso (PDF)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${ingressos == null || ingressos.empty}">
        <p>Você ainda não possui ingressos comprados.</p>
        <a th:href="@{/events}" class="btn-primary" style="display: inline-block; margin-top: 20px; text-decoration: none;">Ver eventos disponíveis</a>
    </div>
</main>

</body>
</html>
