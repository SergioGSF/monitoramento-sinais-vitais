<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Ingressos - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/meus-ingressos.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">
                Eventos e Entretenimento
            </span>
        </div>
    </div>

    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/events}" style="text-decoration: none; color: #666; font-size: 14px;">
            Eventos
        </a>

        <a th:href="@{/meus-ingressos}" style="text-decoration: none; color: var(--laranja); font-weight: bold; font-size: 14px;">
            Meus Ingressos
        </a>

        <a th:href="@{/login}" class="btn-primary" style="padding: 8px 20px;">
            Entrar
        </a>
    </nav>
</header>

<main class="container-ingressos">

    <div class="page-header">
        <h1>Meus Ingressos</h1>
        <p>Veja abaixo seus ingressos comprados.</p>
    </div>

    <div class="ingressos-grid" th:if="${ingressos != null && !ingressos.empty}">

        <div class="ticket-card" th:each="ingresso : ${ingressos}">

            <div class="ticket-details">

                <h3>Compra Realizada</h3>

                <div class="ticket-info-rows">
                    <p><strong>Código:</strong> <span th:text="${ingresso.id}"></span></p>
                    <p><strong>Nome:</strong> <span th:text="${ingresso.nome}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${ingresso.email}"></span></p>
                    <p><strong>CPF:</strong> <span th:text="${ingresso.cpf}"></span></p>
                </div>

                <div class="ticket-footer">

                    <button class="btn-download">
                        Baixar Ingresso (PDF)
                    </button>

                    <form th:action="@{/cancelar-ingresso/{id}(id=${ingresso.id})}" method="post">

                        <input
                            type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}" />

                        <button
                            type="submit"
                            style="margin-top: 10px; background: #d32f2f; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer;">
                            Cancelar Compra
                        </button>

                    </form>

                </div>

            </div>
        </div>

    </div>

    <div class="empty-state" th:if="${ingressos == null || ingressos.empty}">
        <p>Você ainda não possui ingressos comprados.</p>

        <a th:href="@{/events}" class="btn-primary"
           style="display: inline-block; margin-top: 20px; text-decoration: none;">
            Ver eventos disponíveis
        </a>
    </div>

</main>

</body>
</html>
