<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Arena Pernambuco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/pagamento.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">
            <span class="logo-title" style="font-weight: bold; font-size: 15px;">Arena Pernambuco</span>
            <span class="logo-subtitle" style="font-size: 10px; color: #888; display: block;">Eventos e Entretenimento</span>
        </div>
    </div>
    <nav class="nav-links" style="display: flex; gap: 25px; align-items: center;">
        <a th:href="@{/events}" style="text-decoration: none; color: #666; font-size: 14px;">Eventos</a>
        <a th:href="@{/meus-ingressos}" style="text-decoration: none; color: #666; font-size: 14px;">Meus Ingressos</a>
        <a th:href="@{/login}" class="btn-primary" style="padding: 8px 20px;">Sair</a>
    </nav>
</header>

<main class="container" style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">
    <h1 style="margin-bottom: 30px; font-size: 28px;">Finalizar compra</h1>

    <div class="main-grid">
        <div class="left-column">
            <form th:action="@{/confirmacao}" method="post">

                <input type="hidden" name="eventId" th:value="${evento.id}">

                <section class="checkout-card">
                    <h3>Informações de Pagamento</h3>
                    <div class="input-group">
                        <label>Número do Cartão</label>
                        <input type="text" name="numeroCartao" placeholder="0000 0000 0000 0000" required>
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label>Validade</label>
                            <input type="text" placeholder="MM/AA" required>
                        </div>
                        <div class="input-group">
                            <label>CVV</label>
                            <input type="text" placeholder="123" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Nome no Cartão</label>
                        <input type="text" name="nome" placeholder="Como impresso no cartão" required>
                    </div>
                    <div class="input-group">
                        <label>CPF do Titular</label>
                        <input type="text" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                </section>

                <button type="submit" class="btn-finalizar">Confirmar e Pagar</button>
            </form>
        </div>

        <aside class="right-column">
            <div class="summary-card">
                <h3>Resumo do pedido</h3>
                <div class="evento-mini-card" style="display: flex; gap: 15px; margin: 20px 0; align-items: center;">
                    <img th:if="${evento.imageUrl != null}" th:src="${evento.imageUrl}" style="width: 80px; height: 60px; border-radius: 6px; object-fit: cover;">
                    <div>
                        <strong th:text="${evento.title}" style="display: block; font-size: 14px;"></strong>
                        <span th:text="${#temporals.format(evento.date, 'dd/MM/yyyy')}" style="font-size: 12px; color: #666;"></span>
                    </div>
                </div>

                <div class="summary-details">
                    <div class="line"><span>1x Ingresso</span> <span th:text="'R$ ' + ${#numbers.formatDecimal(evento.fullPrice,1,2)}"></span></div>
                    <div class="line"><span>Taxa</span> <span>R$ 15,00</span></div>
                    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                    <div class="line total"><span>Total</span> <span th:text="'R$ ' + ${#numbers.formatDecimal(evento.fullPrice + 15,1,2)}"></span></div>
                </div>
            </div>
        </aside>
    </div>
</main>

</body>
</html>
