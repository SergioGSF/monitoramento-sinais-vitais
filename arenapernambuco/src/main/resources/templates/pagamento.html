<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Pagamento - Arena Pernambuco
    </title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/pagamento.css}">

</head>

<body>

<main class="container">

    <h1 class="titulo-pagina">
        Finalizar Compra
    </h1>

    <div class="main-grid">

        <div>

            <div th:if="${erro}"
                 class="erro">

                Dados inválidos

            </div>

            <form th:action="@{/confirmacao}"
                  method="post"
                  novalidate>

                <input type="hidden"
                       name="eventId"
                       th:value="${evento.id}">

                <input type="hidden"
                       name="quantidade"
                       th:value="${quantidade}">

                <section class="checkout-card">

                    <h3>
                        Informações de Pagamento
                    </h3>

                    <div class="input-group">

                        <label>
                            Número do Cartão
                        </label>

                        <input type="text"
                               name="numeroCartao"
                               placeholder="0000 0000 0000 0000"
                               maxlength="19"
                               inputmode="numeric"
                               required>

                    </div>

                    <div class="row">

                        <div class="input-group">

                            <label>
                                Validade
                            </label>

                            <input type="text"
                                   name="validade"
                                   id="validade"
                                   placeholder="MM/AA"
                                   maxlength="5"
                                   inputmode="numeric"
                                   required>

                        </div>

                        <div class="input-group">

                            <label>
                                CVV
                            </label>

                            <input type="text"
                                   name="cvv"
                                   placeholder="123"
                                   maxlength="4"
                                   inputmode="numeric"
                                   required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label>
                            Nome Completo
                        </label>

                        <input type="text"
                               name="nome"
                               minlength="3"
                               maxlength="100"
                               placeholder="Nome completo"
                               required>

                    </div>

                    <div class="input-group">

                        <label>
                            CPF
                        </label>

                        <input type="text"
                               name="cpf"
                               placeholder="00000000000"
                               maxlength="11"
                               inputmode="numeric"
                               required>

                    </div>

                </section>

                <button type="submit"
                        class="btn-finalizar">

                    Confirmar e Pagar

                </button>

            </form>

        </div>

        <aside>

            <div class="summary-card">

                <h3>
                    Resumo do Pedido
                </h3>

                <div class="evento-box">

                    <img th:src="${evento.imageUrl}"
                         class="evento-img"
                         alt="Evento">

                    <h4 th:text="${evento.title}"
                        class="evento-titulo">
                    </h4>

                </div>

                <div class="line subtotal-line">

                    <span th:text="${quantidade} + 'x Ingresso'">
                    </span>

                    <span th:text="'R$ ' + ${#numbers.formatDecimal(evento.fullPrice * quantidade,1,2,'DEFAULT')}">
                    </span>

                </div>

                <div class="line">

                    <span>
                        Taxa de conveniência
                    </span>

                    <span>
                        R$ 15,00
                    </span>

                </div>

                <hr class="divider">

                <div class="line total">

                    <span>
                        Total
                    </span>

                    <span th:text="'R$ ' + ${#numbers.formatDecimal((evento.fullPrice * quantidade) + 15,1,2,'DEFAULT')}">
                    </span>

                </div>

            </div>

        </aside>

    </div>

</main>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const validade =
        document.getElementById("validade");

    validade.addEventListener("input", function(e){

        let valor = e.target.value
            .replace(/\D/g, "")
            .slice(0,4);

        if(valor.length >= 2){

            let mes = valor.slice(0,2);

            if(parseInt(mes) > 12){
                mes = "12";
            }

            if(parseInt(mes) < 1){
                mes = "01";
            }

            valor = mes + valor.slice(2);
        }

        if(valor.length >= 3){

            valor =
                valor.slice(0,2)
                + "/"
                + valor.slice(2);
        }

        e.target.value = valor;
    });

});

</script>

</body>

</html>
